# EdgeFleet MQTT ACL Configuration
# Each org authenticates with username = org_id
# Pattern-based ACL ensures tenant isolation

# Platform service account (ingestion service) can read all topics
user platform-service
topic read edgefleet/#

# Platform can publish to command and alarm channels
user platform-service
topic write edgefleet/+/+/+/command
topic write edgefleet/+/+/+/alarm

# Per-org pattern: devices can only publish to their own org namespace
# %u is replaced with the authenticated username (org_id)
pattern readwrite edgefleet/%u/#
