version: "3.8"

services:
  mosquitto:
    build:
      context: ./mosquitto
      dockerfile: Dockerfile
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345
      DOCKER_INFLUXDB_INIT_ORG: edgefleet
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: edgefleet-dev-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edgefleet
      POSTGRES_USER: edgefleet
      POSTGRES_PASSWORD: edgefleet123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      - mosquitto
      - influxdb
      - postgres
      - redis
    environment:
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: edgefleet-dev-token
      INFLUXDB_ORG: edgefleet
      INFLUXDB_BUCKET: telemetry
      DATABASE_URL: postgresql+asyncpg://edgefleet:edgefleet123@postgres:5432/edgefleet
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws
    restart: unless-stopped

  simulator:
    build:
      context: ../simulator
      dockerfile: Dockerfile
    depends_on:
      - mosquitto
    environment:
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
    profiles:
      - testing
    command: ["python", "-m", "simulator", "--devices", "2000", "--interval", "5"]

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  postgres_data:
